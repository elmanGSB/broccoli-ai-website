# .github/workflows/deploy.yml
name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: broccolli-ai-web
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/broccolli-ai/broccolli-ai-web

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    outputs:
      image: ${{ steps.push.outputs.imageid }}
      image-tag: ${{ env.IMAGE }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — no stored credentials)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            PUBLIC_BROCCOLI_API=${{ secrets.PUBLIC_BROCCOLI_API || 'https://jumpersapp.com' }}
            PUBLIC_FORMSPREE_URL=${{ secrets.PUBLIC_FORMSPREE_URL || 'https://formspree.io/f/mdayavqr' }}
            PUBLIC_CAL_URL=${{ secrets.PUBLIC_CAL_URL || 'https://cal.com/elman/free-ai-consultation' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ needs.build-and-push.outputs.image-tag }}
          flags: >-
            --allow-unauthenticated
            --concurrency=1000
            --min-instances=0
            --max-instances=10
            --memory=256Mi
            --cpu=1
            --port=8080
            --service-account=cloudrun-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Show deployed URL
        run: echo "✅ Deployed to ${{ steps.deploy.outputs.url }}"
